name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.0.4)"
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: carbonyl.macos-arm64
            gn_cpu: arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: carbonyl.macos-amd64
            gn_cpu: x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: carbonyl.linux-amd64
            gn_cpu: x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 360

    env:
      CHROMIUM_ROOT: ${{ github.workspace }}/chromium
      DEPOT_TOOLS_ROOT: ${{ github.workspace }}/chromium/depot_tools

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure git identity
        run: |
          git config --global user.email "ci@gyoz.ai"
          git config --global user.name "gyoz-ai CI"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/${{ matrix.target }}
          key: rust-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-${{ matrix.target }}-

      - name: Cache Chromium source
        uses: actions/cache@v4
        with:
          path: chromium/src
          key: chromium-src-${{ matrix.os }}-${{ hashFiles('chromium/.gclient', 'chromium/chromium.gclient') }}
          restore-keys: chromium-src-${{ matrix.os }}-

      - name: Cache Chromium build objects
        uses: actions/cache@v4
        with:
          path: chromium/src/out/Release
          key: chromium-build-${{ matrix.os }}-${{ matrix.gn_cpu }}-${{ hashFiles('chromium/patches/**') }}
          restore-keys: chromium-build-${{ matrix.os }}-${{ matrix.gn_cpu }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build pkg-config lsb-release gperf \
            libglib2.0-dev libatk1.0-dev libatk-bridge2.0-dev \
            libcups2-dev libdrm-dev libxkbcommon-dev \
            libxcomposite-dev libxdamage-dev libxrandr-dev \
            libgbm-dev libpango1.0-dev libasound2-dev \
            libnspr4-dev libnss3-dev

      - name: Select Xcode 15.0 (Chromium 111 incompatible with 15.4 SDK)
        if: runner.os == 'macOS'
        run: |
          ls /Applications/Xcode*.app/ 2>/dev/null | head -10
          # Use oldest available Xcode 15.x
          for xcode in /Applications/Xcode_15.0*.app /Applications/Xcode_15.1*.app /Applications/Xcode_15.2*.app /Applications/Xcode_15.3*.app; do
            if [ -d "$xcode" ]; then
              sudo xcode-select -s "$xcode"
              echo "Selected: $xcode"
              break
            fi
          done
          xcodebuild -version

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Sync Chromium source and run hooks
        run: |
          export PATH="$DEPOT_TOOLS_ROOT:$PATH"
          cd chromium
          gclient sync --no-history --nohooks
          # Patch mac_toolchain.py BEFORE hooks
          if [ -f src/build/mac_toolchain.py ]; then
            echo 'import sys; sys.exit(0)' > src/build/mac_toolchain.py
            echo "Patched mac_toolchain.py (Xcode already on runner)"
          fi
          gclient runhooks

      - name: Apply patches
        run: scripts/patches.sh apply

      - name: Fix Skia Metal bridge casts (macOS SDK compat)
        if: runner.os == 'macOS'
        run: |
          F="chromium/src/third_party/skia/src/gpu/ganesh/mtl/GrMtlGpu.mm"
          sed -i.bak 's/const void\* cfFence = (__bridge_retained const void\*) semaphore;/dispatch_retain(semaphore); const void* cfFence = (const void*) semaphore;/' "$F"
          sed -i.bak 's/dispatch_semaphore_t semaphore = (__bridge dispatch_semaphore_t)cfFence;/dispatch_semaphore_t semaphore = (dispatch_semaphore_t)cfFence;/' "$F"
          grep -n "cfFence" "$F" | head -4

      - name: Configure (gn gen)
        run: |
          export PATH="$DEPOT_TOOLS_ROOT:$PATH"
          cd chromium/src
          gn gen out/Release --args='import("//carbonyl/src/browser/args.gn") is_debug=false symbol_level=0 treat_warnings_as_errors=false enable_swiftshader=false angle_enable_swiftshader=false target_cpu="${{ matrix.gn_cpu }}"'

      - name: Build carbonyl Rust library
        run: |
          # Ensure build dir exists (Cargo target-dir = "build" in .cargo/config)
          rm -f build 2>/dev/null; mkdir -p build
          if [ "${{ runner.os }}" = "macOS" ]; then
            export MACOSX_DEPLOYMENT_TARGET=10.13
          fi
          cargo build --target ${{ matrix.target }} --release

      - name: Copy Rust library to Chromium
        run: |
          if [ -f "build/${{ matrix.target }}/release/libcarbonyl.dylib" ]; then
            cp "build/${{ matrix.target }}/release/libcarbonyl.dylib" chromium/src/out/Release/
            install_name_tool -id @executable_path/libcarbonyl.dylib "chromium/src/out/Release/libcarbonyl.dylib"
          else
            cp "build/${{ matrix.target }}/release/libcarbonyl.so" chromium/src/out/Release/
          fi

      - name: Build Chromium (ninja)
        run: |
          export PATH="$DEPOT_TOOLS_ROOT:$PATH"
          cd chromium/src
          ninja -C out/Release headless:headless_shell

      - name: Package
        run: |
          scripts/copy-binaries.sh Release
          cd build/packages/Release
          zip -r ${{ matrix.artifact }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/packages/Release/${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Terminal Chromium ${{ inputs.version }}
          files: artifacts/**/*.zip
          generate_release_notes: true

